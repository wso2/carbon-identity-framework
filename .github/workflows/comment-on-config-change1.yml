name: Comment on config file change

on:
  pull_request:
    paths:
      - 'features/identity-core/org.wso2.carbon.identity.core.server.feature/resources/org.wso2.carbon.identity.core.server.feature.default.json'

jobs:
  review-comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Get the latest commit SHA
        id: get-sha
        run: echo "sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT

      - name: Post inline review comment on file
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.repo;
            const baseUrl = `https://github.com/${repo.owner}/${repo.repo}/blob/master/features/identity-core/org.wso2.carbon.identity.core.server.feature/resources`;
            const defaultJsonUrl = `${baseUrl}/org.wso2.carbon.identity.core.server.feature.default.json`;
            const inferJsonUrl = `${baseUrl}/org.wso2.carbon.identity.core.server.feature.infer.json`;

            await github.rest.pulls.createReviewComment({
              owner: repo.owner,
              repo: repo.repo,
              pull_number: context.issue.number,
              commit_id: '${{ steps.get-sha.outputs.sha }}',
              path: 'features/identity-core/org.wso2.carbon.identity.core.server.feature/resources/org.wso2.carbon.identity.core.server.feature.default.json',
              subject_type: 'file',
              body: `⚠️ **Config Migration Check**\n\nThis PR modifies [\`org.wso2.carbon.identity.core.server.feature.default.json\`](${defaultJsonUrl}).\n\nPlease make sure that the corresponding configurations are also added to [\`features/identity-core/org.wso2.carbon.identity.core.server.feature/resources/org.wso2.carbon.identity.core.server.feature.infer.json\`](${inferJsonUrl}) to maintain **backward compatibility** during migration.\n\n> [!NOTE]\n> The [\`infer.json\`](${inferJsonUrl}) file stores the default configuration values for each version in the same release line, based on the behavioral changes introduced in the upcoming release. This ensures that existing deployments continue to behave as before after upgrading.`
            })
